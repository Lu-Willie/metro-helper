<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大台北捷運與周邊轉乘助手正式版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { height: 450px; width: 100%; border-radius: 0.75rem; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800">

    <div class="max-w-6xl mx-auto p-4 md:p-6">
        <header class="mb-6 text-center md:text-left">
            <h1 class="text-3xl font-bold text-indigo-700">🚇 大台北捷運與周邊轉乘助手</h1>
            <p class="text-slate-500 mt-1">整合台北捷運、桃園機捷、即時公車與 YouBike 2.0 資訊</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-5 space-y-6">
                
                <div class="bg-white p-5 rounded-xl shadow-md border border-slate-200">
                    <h2 class="text-xl font-semibold text-slate-700 mb-4 flex items-center">
                        🔍 車站出口周邊查詢
                    </h2>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-slate-500 mb-1">選擇車站</label>
                        <select id="stationSelect" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                            <option value="">-- 請選擇車站 --</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-slate-500 mb-2">選擇出口：</label>
                        <div id="exitBtnContainer" class="flex flex-wrap gap-2">
                            <span class="text-slate-400 text-sm italic">請先選擇上方車站...</span>
                        </div>
                    </div>

                    <div class="flex border-b border-slate-200 mt-6" id="tabs">
                        <button onclick="switchTab('spots')" id="tab-spots" class="flex-1 py-2 text-center font-medium border-b-2 border-indigo-600 text-indigo-600">🗺️ 景點機構</button>
                        <button onclick="switchTab('bus')" id="tab-bus" class="flex-1 py-2 text-center font-medium text-slate-500 hover:text-indigo-600">🚌 附近公車</button>
                        <button onclick="switchTab('bike')" id="tab-bike" class="flex-1 py-2 text-center font-medium text-slate-500 hover:text-indigo-600">🚲 YouBike</button>
                    </div>

                    <div class="mt-4 min-h-[150px]">
                        <div id="panel-spots" class="tab-panel space-y-2">
                            <ul id="spotsList" class="list-disc list-inside space-y-1 text-slate-600">
                                <li class="text-slate-400 italic">暫無景點資料</li>
                            </ul>
                        </div>
                        <div id="panel-bus" class="tab-panel hidden space-y-2">
                            <div id="busList" class="space-y-2">
                                <p class="text-slate-400 italic">暫無公車即時資料</p>
                            </div>
                        </div>
                        <div id="panel-bike" class="tab-panel hidden space-y-2">
                            <div id="bikeList" class="space-y-2">
                                <p class="text-slate-400 italic">暫無單車即時資料</p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="lg:col-span-7">
                <div class="bg-white p-4 rounded-xl shadow-md border border-slate-200">
                    <h2 class="text-xl font-semibold text-slate-700 mb-3 flex items-center">
                        🗺️ 周邊互動地圖
                    </h2>
                    <div id="map"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- 全域變數定義 ---
        let map;
        let globalStations = []; // 儲存 stations.json 的資料
        let currentActiveCoordinates = { lat: 25.0478, lng: 121.5170 }; // 預設台北車站
        let activeTab = 'spots'; // 預設分頁

        // --- 1. 初始化網頁與地圖 ---
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化 Leaflet 地圖，預設定位在台北車站
            map = L.map('map').setView([currentActiveCoordinates.lat, currentActiveCoordinates.lng], 15);
            
            // 載入 OpenStreetMap 開源地圖磚
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> 貢獻者'
            }).addTo(map);

            // 讀取本地的 stations.json 擴充資料庫
            fetch('./stations.json')
                .then(res => {
                    if (!res.ok) throw new Error("找不到 stations.json 檔案");
                    return res.json();
                })
                .then(data => {
                    globalStations = data;
                    populateStationSelect(data);
                })
                .catch(err => console.error("初始化載入站點錯誤:", err));

            // 🚀【定時跑馬燈功能】每隔 30 秒，自動重新執行一次抓取 YouBike 和公車的 API
            setInterval(function() {
                console.log("[定時定點整理] 觸發 30 秒動態即時資料刷新...");
                updateNearbyTransitData(currentActiveCoordinates.lat, currentActiveCoordinates.lng);
            }, 30000); // 30000 毫秒 = 30 秒
        });

        // --- 2. 渲染車站下拉選單 ---
        function populateStationSelect(stations) {
            const select = document.getElementById('stationSelect');
            stations.forEach(station => {
                const opt = document.createElement('option');
                opt.value = station.station_name;
                opt.textContent = `${station.station_name} (${station.line_name})`;
                select.appendChild(opt);
            });

            // 綁定下拉選單切換事件
            select.addEventListener('change', (e) => {
                const matchedStation = stations.find(s => s.station_name === e.target.value);
                if (matchedStation) {
                    renderExitButtons(matchedStation);
                    // 預設切換到該車站的主體經緯度，並讓地圖飛過去
                    handleStationOrExitChange(matchedStation);
                }
            });
        }

        // --- 3. 渲染出口按鈕群 ---
        function renderExitButtons(station) {
            const container = document.getElementById('exitBtnContainer');
            container.innerHTML = ''; // 清空舊按鈕

            if (!station.exits || station.exits.length === 0) {
                container.innerHTML = '<span class="text-slate-400 text-sm italic">該站暫無出口詳細資料</span>';
                return;
            }

            station.exits.forEach((exit, index) => {
                const btn = document.createElement('button');
                btn.className = `px-3 py-1.5 text-sm font-semibold rounded-md transition-all ${
                    index === 0 ? 'bg-indigo-600 text-white shadow-sm' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'
                }`;
                btn.textContent = `出口 ${exit.exit_id}`;
                
                // 點擊出口按鈕時的切換行為
                btn.addEventListener('click', () => {
                    // 切換按鈕的高亮樣式
                    Array.from(container.children).forEach(b => {
                        b.className = 'px-3 py-1.5 text-sm font-semibold rounded-md transition-all bg-slate-200 text-slate-700 hover:bg-slate-300';
                    });
                    btn.className = 'px-3 py-1.5 text-sm font-semibold rounded-md transition-all bg-indigo-600 text-white shadow-sm';
                    
                    // 讓地圖飛去這個出口，並附帶車站名稱供標籤顯示
                    const exitWithLabel = { ...exit, station_name: `${station.station_name} 出口 ${exit.exit_id}` };
                    handleStationOrExitChange(exitWithLabel);
                });

                container.appendChild(btn);
            });

            // 預設模擬點擊第一個出口
            const firstExit = { ...station.exits[0], station_name: `${station.station_name} 出口 ${station.exits[0].exit_id}` };
            handleStationOrExitChange(firstExit);
        }

        // --- 4. 核心控制功能：當使用者切換車站或出口時，地圖與資料同步跳轉 ---
        function handleStationOrExitChange(selectedData) {
            if (!selectedData) return;

            // 智慧相容大寫（TDX格式）與小寫（我們新JSON的格式）
            const lat = parseFloat(selectedData.lat || selectedData.Latitude);
            const lng = parseFloat(selectedData.lng || selectedData.Longitude || selectedData.Lng);

            if (isNaN(lat) || isNaN(lng)) {
                console.error("無法讀取有效的經緯度資料:", selectedData);
                return;
            }

            // 更新當前全域定位點，供 30 秒計時器刷新時使用
            currentActiveCoordinates = { lat, lng };

            console.log(`[地圖導航] 目標鎖定: ${selectedData.station_name} [${lat}, ${lng}]`);

            // 🚀【地圖優先跳轉】不受 API 報錯阻斷，地圖第一時間飛過去！
            if (map) {
                map.setView([lat, lng], 16);
                
                // 在地圖上加上漂亮的小圖標與泡泡文字
                if (window.currentMarker) map.removeLayer(window.currentMarker);
                window.currentMarker = L.marker([lat, lng]).addTo(map)
                    .bindPopup(`<b class="text-indigo-600">${selectedData.station_name}</b><br>周邊 300M 觀測中`)
                    .openPopup();
            }

            // 更新靜態景點機構介面
            renderSpotsList(selectedData.spots);

            // 🔄 同步發送請求到交通部 TDX，抓取周邊公車與單車資料
            updateNearbyTransitData(lat, lng);
        }

        // --- 5. 渲染景點清單 UI ---
        function renderSpotsList(spots) {
            const list = document.getElementById('spotsList');
            list.innerHTML = '';
            if (!spots || spots.length === 0) {
                list.innerHTML = '<li class="text-slate-400 italic">此出口周邊暫無登錄景點</li>';
                return;
            }
            spots.forEach(spot => {
                const li = document.createElement('li');
                li.className = 'text-slate-600 py-0.5';
                li.textContent = spot;
                list.appendChild(li);
            });
        }

        // --- 6. 資料請求功能：串接交通部 TDX API (修復 404 拼湊參數) ---
        function updateNearbyTransitData(lat, lng) {
            // 💡【徹底修復 404】嚴格依照 TDX 格式拼接 OData 空間幾何過濾字串
            const busApiUrl = `https://tdx.transportdata.tw/api/basic/v2/Bus/Station/NearBy/City/Taipei?%24spatialFilter=nearby(${lat}%2C${lng}%2C300)&%24format=JSON`;
            const bikeApiUrl = `https://tdx.transportdata.tw/api/basic/v2/Bike/Availability/NearBy?%24spatialFilter=nearby(${lat}%2C${lng}%2C300)&%24format=JSON`;

            // --- (A) 異步索取公車資料 ---
            fetch(busApiUrl)
                .then(res => {
                    if (!res.ok) throw new Error(`公車 API 回應異常: ${res.status}`);
                    return res.json();
                })
                .then(data => {
                    renderBusUI(data);
                })
                .catch(err => {
                    console.warn("公車 API 限制連線，啟動防禦模擬資料機制。");
                    renderMockBusUI();
                });

            // --- (B) 異步索取 YouBike 資料 ---
            fetch(bikeApiUrl)
                .then(res => {
                    if (!res.ok) throw new Error(`單車 API 回應異常: ${res.status}`);
                    return res.json();
                })
                .then(data => {
                    renderBikeUI(data);
                })
                .catch(err => {
                    console.warn("YouBike API 限制連線，啟動防禦模擬資料機制。");
                    renderMockBikeUI();
                });
        }

        // --- 7. 公車與 YouBike 的真實 UI 渲染功能 ---
        function renderBusUI(data) {
            const container = document.getElementById('busList');
            container.innerHTML = '';
            if (!data || data.length === 0) {
                container.innerHTML = '<p class="text-slate-400 italic">周邊 300 公尺內無公車站牌</p>';
                return;
            }
            // 取前 4 筆顯示，保持介面整潔
            data.slice(0, 4).forEach(station => {
                const div = document.createElement('div');
                div.className = 'p-2 bg-slate-50 rounded border border-slate-200 text-sm';
                div.innerHTML = `📍 <b>${station.StationName.Zh_tw}</b><br><span class="text-xs text-slate-500">公車路線行經此站牌點</span>`;
                container.appendChild(div);
            });
        }

        function renderBikeUI(data) {
            const container = document.getElementById('bikeList');
            container.innerHTML = '';
            // TDX 的單車結構外層可能包裹在一個陣列或物件中，做安全防禦
            const stations = data.BikeStationAvailabilityList || data;
            if (!stations || stations.length === 0) {
                container.innerHTML = '<p class="text-slate-400 italic">周邊 300 公尺內無 YouBike 站點</p>';
                return;
            }
            stations.slice(0, 3).forEach(bike => {
                const div = document.createElement('div');
                div.className = 'p-2 bg-emerald-50 rounded border border-emerald-200 text-sm';
                div.innerHTML = `🚲 <b>${bike.StationName?.Zh_tw || 'YouBike 站點'}</b><br>
                                 <span class="text-xs text-slate-600">可借: <b class="text-emerald-600">${bike.AvailableRentBikes || 0}</b> 輛 | 
                                 可還: <b class="text-slate-500">${bike.AvailableReturnSlots || 0}</b> 空位</span>`;
                container.appendChild(div);
            });
        }

        // --- 8. 本地備援防禦防禦機制 (Fallback Mock UI) ---
        function renderMockBusUI() {
            const container = document.getElementById('busList');
            container.innerHTML = `
                <div class="p-2 bg-indigo-50 border border-indigo-100 rounded text-sm relative">
                    <span class="absolute top-1 right-1 text-[10px] bg-indigo-200 text-indigo-700 px-1 rounded">防禦備援</span>
                    📍 <b>捷運台北車站(忠孝)</b><br>
                    <span class="text-xs text-slate-500">公車 299 / 藍1 往周邊轉乘 <b class="text-indigo-600">[7分鐘]</b></span>
                </div>
                <div class="p-2 bg-indigo-50 border border-indigo-100 rounded text-sm relative">
                    <span class="absolute top-1 right-1 text-[10px] bg-indigo-200 text-indigo-700 px-1 rounded">防禦備援</span>
                    📍 <b>台北車站(青島)</b><br>
                    <span class="text-xs text-slate-500">公車 5 / 37 往周邊轉乘 <b class="text-indigo-600">[5分鐘]</b></span>
                </div>
            `;
        }

        function renderMockBikeUI() {
            const container = document.getElementById('bikeList');
            container.innerHTML = `
                <div class="p-2 bg-emerald-50 border border-emerald-100 rounded text-sm relative">
                    <span class="absolute top-1 right-1 text-[10px] bg-emerald-200 text-emerald-700 px-1 rounded">防禦備援</span>
                    🚲 <b>YouBike 2.0 捷運台北車站(3號出口)</b><br>
                    <span class="text-xs text-slate-600">可借: <b class="text-emerald-600">14</b> 輛 | 可還: <b class="text-slate-400">22</b> 空位</span>
                </div>
            `;
        }

        // --- 9. 切換分頁 UI 邏輯 ---
        function switchTab(tabName) {
            activeTab = tabName;
            // 隱藏所有面板
            document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.add('hidden'));
            // 顯示點選的面板
            document.getElementById(`panel-${tabName}`).classList.remove('hidden');

            // 還原所有標籤樣式
            document.querySelectorAll('#tabs button').forEach(btn => {
                btn.className = 'flex-1 py-2 text-center font-medium text-slate-500 hover:text-indigo-600';
            });
            // 高亮當前標籤
            document.getElementById(`tab-${tabName}`).className = 'flex-1 py-2 text-center font-medium border-b-2 border-indigo-600 text-indigo-600';
        }
    </script>
</body>
</html>
