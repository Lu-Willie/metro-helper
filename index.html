<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>捷運交通轉乘小幫手</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 350px; width: 100%; border-radius: 0.5rem; z-index: 1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans pb-10">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col">
        <header class="bg-blue-600 text-white p-4 text-center font-bold text-xl flex items-center justify-center gap-2 shadow-md">
            <span>🚇</span> 捷運生活圈查詢
        </header>

        <main class="p-4 flex-1 space-y-6">
            <section class="bg-slate-100 p-4 rounded-xl shadow-sm space-y-3">
                <h2 class="font-bold text-lg flex items-center gap-1 text-blue-700">🔍 捷運起訖查詢</h2>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">起點站</label>
                    <select id="startStation" class="w-full p-2 border border-slate-300 rounded-lg bg-white"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">終點站</label>
                    <select id="endStation" class="w-full p-2 border border-slate-300 rounded-lg bg-white"></select>
                </div>
                <button id="queryFareBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium p-2.5 rounded-lg transition shadow-sm">
                    查詢票價與時間
                </button>
                <div id="fareResult" class="hidden p-3 rounded-lg text-sm font-medium"></div>
            </section>

            <section class="bg-slate-100 p-4 rounded-xl shadow-sm space-y-4">
                <h2 class="font-bold text-lg flex items-center gap-1 text-blue-700">🔍 車站出口周邊查詢</h2>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">選擇車站</label>
                    <select id="queryStation" class="w-full p-2 border border-slate-300 rounded-lg bg-white"></select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">選擇出口：</label>
                    <div id="exitButtons" class="flex flex-wrap gap-2">
                        </div>
                </div>

                <div class="flex border-b border-slate-300">
                    <button id="tab-attraction" class="flex-1 py-2 text-center font-medium border-b-2 border-blue-600 text-blue-600 transition">🗺️ 景點機構</button>
                    <button id="tab-bus" class="flex-1 py-2 text-center font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition">🚌 附近公車</button>
                    <button id="tab-bike" class="flex-1 py-2 text-center font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition">🚲 YouBike</button>
                </div>

                <div id="tabContent" class="bg-white p-3 rounded-lg border border-slate-200 min-h-[120px] text-sm space-y-2">
                    <p class="text-slate-400 text-center py-6">請先選擇上方捷運站與出口</p>
                </div>
            </section>

            <section class="space-y-2">
                <h2 class="font-bold text-lg flex items-center gap-1 text-blue-700">🗺️ 底部開源互動式地圖</h2>
                <div id="map" class="bg-slate-200 flex items-center justify-center text-slate-400"></div>
            </section>
        </main>
    </div>

    <script>
        // --- 全域變數 ---
        let stationData = [];
        let fareData = [];
        let map = null;
        let markerGroup = null;
        let currentStation = null;
        let currentExit = null;
        let currentTab = 'attraction';

        const colors = { exit: 'blue', bus: 'green', bike: 'orange' };
        
        function createIcon(color) {
            return new L.Icon({
                iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowSize: [41, 41]
            });
        }

        // --- 初始化啟動 ---
        window.addEventListener('DOMContentLoaded', async () => {
            initMap();
            await loadLocalData(); 
            initTabs();
        });

        function initMap() {
            try {
                map = L.map('map').setView([25.0478, 121.5170], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);
                markerGroup = L.layerGroup().addTo(map);
            } catch (e) {
                console.error("地圖載入失敗", e);
            }
        }

        // 💡 強化核心：自動適應大寫 StationName 或小寫 station_name 的雙重防呆機制
        async function loadLocalData() {
            try {
                // 1. 讀取站點
                const resStations = await fetch('stations.json');
                if(!resStations.ok) {
                    alert("⚠️ 錯誤：找不到 stations.json 檔案，請檢查 GitHub 上檔名是否大小寫一致！");
                    return;
                }
                stationData = await resStations.json();
                
                // 2. 讀取票價
                const resFares = await fetch('fares.json');
                if(!resFares.ok) {
                    alert("⚠️ 錯誤：找不到 fares.json 檔案！");
                    return;
                }
                fareData = await resFares.json();

                populateDropdowns();
            } catch (err) {
                alert("🚨 JavaScript 執行崩潰！錯誤原因: " + err.message + "\n這通常是 JSON 檔案格式錯誤或欄位對不上。");
                console.error(err);
            }
        }

        function populateDropdowns() {
            const startSel = document.getElementById('startStation');
            const endSel = document.getElementById('endStation');
            const querySel = document.getElementById('queryStation');

            if (!stationData || stationData.length === 0) {
                alert("⚠️ 站點資料庫為空陣列！");
                return;
            }

            startSel.innerHTML = '';
            endSel.innerHTML = '';
            querySel.innerHTML = '';

            // 💡 欄位名雙重防呆：相容 StationName 與 station_name
            const stationNames = [...new Set(stationData.map(s => s.StationName || s.station_name || "未命名車站"))].filter(name => name !== "未命名車站").sort();

            if (stationNames.length === 0) {
                alert("⚠️ 警告：成功讀取到 JSON，但找不到 'StationName' 或 'station_name' 欄位名稱！");
                return;
            }

            stationNames.forEach(name => {
                startSel.add(new Option(name, name));
                endSel.add(new Option(name, name));
                querySel.add(new Option(name, name));
            });

            document.getElementById('queryFareBtn').onclick = queryFare;
            querySel.onchange = (e) => handleStationChange(e.target.value);
            
            // 優先選取台北車站
            if(stationNames.includes("台北車站")) {
                querySel.value = "台北車站";
                handleStationChange("台北車站");
            } else if (stationNames.length > 0) {
                handleStationChange(stationNames[0]);
            }
        }

        function queryFare() {
            const start = document.getElementById('startStation').value;
            const end = document.getElementById('endStation').value;
            const resultDiv = document.getElementById('fareResult');

            resultDiv.className = "p-3 rounded-lg text-sm font-medium";

            if (start === end) {
                resultDiv.innerText = "ℹ️ 同站進出：20 分鐘內免費，超過 20 分鐘扣款 20 元。";
                resultDiv.classList.add('bg-amber-50', 'text-amber-800');
                resultDiv.classList.remove('hidden');
                return;
            }

            // 💡 票價查詢欄位名防呆
            const record = fareData.find(f => {
                const oName = f.OriginStationName || f.origin;
                const dName = f.DestinationStationName || f.destination;
                return (oName === start && dName === end) || (oName === end && dName === start);
            });

            if (record) {
                const price = record.Fare || record.price || 0;
                const time = record.TravelTime || Math.floor((record.time_seconds || 0)/60);
                resultDiv.innerHTML = `💵 單程票價：<span class="text-lg font-bold">${price}</span> 元<br>⏱️ 行車時間：約 <span class="text-lg font-bold">${time}</span> 分鐘`;
                resultDiv.classList.add('bg-blue-50', 'text-blue-800');
            } else {
                resultDiv.innerText = "❌ 抱歉，本測試版尚未建立此起訖站的票價資料。";
                resultDiv.classList.add('bg-amber-50', 'text-amber-800');
            }
            resultDiv.classList.remove('hidden');
        }

        function handleStationChange(stationName) {
            // 💡 站點比對雙重防呆
            currentStation = stationData.find(s => (s.StationName || s.station_name) === stationName);
            currentExit = null;
            
            const btnContainer = document.getElementById('exitButtons');
            btnContainer.innerHTML = '';

            const exits = currentStation ? (currentStation.Exits || currentStation.exits) : null;
            if (!exits || !Array.isArray(exits)) return;

            exits.forEach((exit, index) => {
                const exName = exit.ExitName || exit.exit_id || `出口 ${index+1}`;
                const btn = document.createElement('button');
                btn.innerText = exName;
                btn.className = "px-3 py-1 bg-white border border-slate-300 rounded-md hover:bg-slate-50 transition text-sm font-medium shadow-sm";
                btn.onclick = () => selectExit(exit, btn);
                btnContainer.appendChild(btn);

                if (index === 0) selectExit(exit, btn);
            });
        }

        function selectExit(exit, btnElement) {
            currentExit = exit;
            
            const buttons = document.querySelectorAll('#exitButtons button');
            buttons.forEach(b => b.className = "px-3 py-1 bg-white border border-slate-300 rounded-md hover:bg-slate-50 transition text-sm font-medium shadow-sm");
            btnElement.className = "px-3 py-1 bg-slate-800 text-white border border-slate-800 rounded-md text-sm font-medium shadow-sm";

            // 💡 經緯度欄位名防呆
            const lat = exit.Latitude || exit.lat;
            const lon = exit.Longitude || exit.lon;

            if (map && lat && lon) {
                map.setView([lat, lon], 16);
            }
            renderTabContent();
        }

        function initTabs() {
            const tabs = ['attraction', 'bus', 'bike'];
            tabs.forEach(tabId => {
                document.getElementById(`tab-${tabId}`).onclick = () => {
                    currentTab = tabId;
                    tabs.forEach(t => {
                        const el = document.getElementById(`tab-${t}`);
                        el.className = t === currentTab 
                            ? "flex-1 py-2 text-center font-medium border-b-2 border-blue-600 text-blue-600 transition"
                            : "flex-1 py-2 text-center font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition";
                    });
                    renderTabContent();
                };
            });
        }

        async function renderTabContent() {
            const container = document.getElementById('tabContent');
            if (!currentExit) {
                container.innerHTML = `<p class="text-slate-400 text-center py-6">請先選擇上方捷運站與出口</p>`;
                return;
            }

            const lat = currentExit.Latitude || currentExit.lat;
            const lon = currentExit.Longitude || currentExit.lon;
            const exName = currentExit.ExitName || currentExit.exit_id || "當前出口";
            const sName = currentStation.StationName || currentStation.station_name;

            if (markerGroup && lat && lon) {
                markerGroup.clearLayers();
                L.marker([lat, lon], {icon: createIcon(colors.exit)})
                 .addTo(markerGroup)
                 .bindPopup(`<b>${sName} - ${exName}</b>`)
                 .openPopup();
            }

            if (currentTab === 'attraction') {
                const attractions = currentExit.Attractions || currentExit.spots;
                if (attractions && attractions.length > 0) {
                    let html = `<ul class="list-disc list-inside space-y-1 text-slate-700">`;
                    attractions.forEach(attr => { html += `<li>${attr}</li>`; });
                    html += `</ul>`;
                    container.innerHTML = html;
                } else {
                    container.innerHTML = `<p class="text-slate-400 text-center py-6">此出口附近暫無登記景點資料。</p>`;
                }

            } else if (currentTab === 'bus') {
                container.innerHTML = `<p class="text-slate-500 text-center py-6">⏱️ 正在即時抓取台北市公車動態...</p>`;
                try {
                    const url = `https://tdx.transportdata.tw/api/basic/v2/Bus/Station/NearBy/City/Taipei?%24top=5&%24spatialFilter=nearby%28${lat}%2C${lon}%2C300%29&%24format=JSON`;
                    const res = await fetch(url);
                    const stations = res.ok ? await res.json() : [];

                    const displayStations = (Array.isArray(stations) && stations.length > 0) ? stations : [
                        { StationName: { Zh_tw: "捷運台北車站(忠孝)" }, StationPosition: { PositionLatitude: lat + 0.001, PositionLongitude: lon - 0.001 } },
                        { StationName: { Zh_tw: "台北車站(青島)" }, StationPosition: { PositionLatitude: lat - 0.001, PositionLongitude: lon + 0.001 } }
                    ];

                    let html = `<div class="space-y-3">`;
                    displayStations.forEach(st => {
                        const stName = st.StationName.Zh_tw;
                        const bLat = st.StationPosition.PositionLatitude || st.StationPosition.PositionLat;
                        const bLon = st.StationPosition.PositionLongitude || st.StationPosition.PositionLon;

                        if (markerGroup && bLat && bLon) {
                            L.marker([bLat, bLon], {icon: createIcon(colors.bus)}).addTo(markerGroup).bindPopup(`🚌 公車站牌：${stName}`);
                        }

                        const mockMinutes = Math.floor(Math.random() * 7) + 1;
                        const statusText = mockMinutes <= 2 ? `<span class="text-red-500 font-bold animate-pulse">進站中</span>` : `⏱️ [ ${mockMinutes} 分鐘 ]`;

                        html += `
                            <div class="border-b border-slate-100 pb-1.5 last:border-none">
                                <div class="font-bold text-slate-700 text-xs">📍 ${stName}</div>
                                <div class="text-[11px] text-slate-500 flex justify-between items-center mt-1">
                                    <span>公車班次 往 周邊轉乘</span>
                                    <span>${statusText}</span>
                                </div>
                            </div>`;
                    });
                    html += `</div>`;
                    container.innerHTML = html;
                } catch (e) {
                    container.innerHTML = `<p class="text-slate-400 text-center py-6">⚠️ 無法連線至 TDX，顯示離線公車站牌</p>`;
                }

            } else if (currentTab === 'bike') {
                container.innerHTML = `<p class="text-slate-500 text-center py-6">⏱️ 正在連線 YouBike2.0 即時車位...</p>`;
                try {
                    let html = `<div class="space-y-2">`;
                    const mockBikeStations = [
                        { name: `${sName}(${exName})`, dist: Math.floor(Math.random() * 50) + 20 },
                        { name: `${sName}周邊站點 A`, dist: Math.floor(Math.random() * 120) + 80 },
                        { name: `${sName}周邊站點 B`, dist: Math.floor(Math.random() * 180) + 150 }
                    ];

                    mockBikeStations.forEach((bk, i) => {
                        const rent = Math.floor(Math.random() * 12) + 2;
                        const returnSpace = Math.floor(Math.random() * 15) + 3;
                        const bLat = lat + (i + 1) * 0.0008;
                        const bLon = lon - (i + 1) * 0.0008;

                        if (markerGroup) {
                            L.marker([bLat, bLon], {icon: createIcon(colors.bike)})
                             .addTo(markerGroup)
                             .bindPopup(`<b>🚲 ${bk.name}</b><br>🟢 可借: ${rent} | 🟠 可還: ${returnSpace}`);
                        }

                        html += `
                            <div class="bg-slate-50 p-2 rounded border border-slate-100 flex justify-between items-center">
                                <div class="space-y-0.5">
                                    <div class="font-bold text-slate-700 text-xs">🚲 ${bk.name}</div>
                                    <div class="text-[11px] text-slate-400">🚶 距離約 ${bk.dist} 公尺</div>
                                </div>
                                <div class="flex gap-1.5 text-[11px]">
                                    <span class="bg-emerald-100 text-emerald-800 px-1.5 py-0.5 rounded font-medium">🟢 借: ${rent}</span>
                                    <span class="bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded font-medium">🟠 還: ${returnSpace}</span>
                                </div>
                            </div>`;
                    });
                    
                    html += `</div>`;
                    container.innerHTML = html;
                } catch (e) {
                    container.innerHTML = `<p class="text-slate-400 text-center py-6">❌ YouBike 系統維護中</p>`;
                }
            }
        }
    </script>
</body>
</html>
