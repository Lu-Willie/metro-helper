<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>捷運交通轉乘小幫手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 350px; width: 100%; border-radius: 0.5rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-10">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col">
        <header class="bg-blue-600 text-white p-4 text-center font-bold text-xl shadow-md">🚇 捷運生活圈查詢</header>

        <main class="p-4 flex-1 space-y-6">
            <section class="bg-slate-100 p-4 rounded-xl shadow-sm space-y-3">
                <h2 class="font-bold text-lg text-blue-700">🔍 捷運起訖查詢</h2>
                <select id="startStation" class="w-full p-2 border rounded-lg"></select>
                <select id="endStation" class="w-full p-2 border rounded-lg"></select>
                <button id="queryFareBtn" class="w-full bg-blue-600 text-white font-medium p-2.5 rounded-lg hover:bg-blue-700 transition">查詢票價</button>
                <div id="fareResult" class="hidden p-3 rounded-lg text-sm"></div>
            </section>

            <section class="bg-slate-100 p-4 rounded-xl shadow-sm space-y-4">
                <h2 class="font-bold text-lg text-blue-700">🔍 車站周邊查詢</h2>
                <select id="queryStation" class="w-full p-2 border rounded-lg"></select>
                <div id="exitButtons" class="flex flex-wrap gap-2"></div>
                
                <div class="flex border-b border-slate-300">
                    <button id="tab-attraction" class="tab-btn flex-1 py-2 font-medium border-b-2 border-blue-600 text-blue-600">景點</button>
                    <button id="tab-bus" class="tab-btn flex-1 py-2 font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700">公車</button>
                    <button id="tab-bike" class="tab-btn flex-1 py-2 font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700">單車</button>
                </div>
                
                <div id="tabContent" class="bg-white p-3 rounded-lg border min-h-[120px] text-sm">請選擇車站</div>
                <div id="map"></div>
            </section>
        </main>
    </div>

    <script>
        let stationData = [];
        let map = null, markerGroup = null, currentStation = null, currentExit = null, currentTab = 'attraction';

        window.addEventListener('DOMContentLoaded', async () => {
            initMap();
            await loadData();
            initListeners();
        });

        function initMap() {
            map = L.map('map').setView([25.0478, 121.5170], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
                attribution: '© OpenStreetMap' 
            }).addTo(map);
            markerGroup = L.layerGroup().addTo(map);
        }

        async function loadData() {
            try {
                const res = await fetch('stations.json');
                const data = await res.json();
                stationData = data;
                
                const selects = ['startStation', 'endStation', 'queryStation'];
                selects.forEach(id => {
                    const el = document.getElementById(id);
                    el.innerHTML = '<option value="">請選擇車站</option>';
                    data.forEach(s => {
                        const opt = document.createElement('option');
                        opt.value = s.station_id;
                        opt.textContent = s.station_name;
                        el.appendChild(opt);
                    });
                });
            } catch (e) { console.error("資料載入錯誤", e); }
        }

        function initListeners() {
            // 車站選擇監聽
            document.getElementById('queryStation').addEventListener('change', (e) => {
                currentStation = stationData.find(s => s.station_id === e.target.value);
                currentExit = null; // 重置出口
                renderExits();
                document.getElementById('tabContent').innerHTML = "請選擇出口";
            });

            // 票價查詢功能
            document.getElementById('queryFareBtn').addEventListener('click', () => {
                const start = document.getElementById('startStation').value;
                const end = document.getElementById('endStation').value;
                const resDiv = document.getElementById('fareResult');
                resDiv.classList.remove('hidden');
                
                if (start && end) {
                    if (start === end) {
                        resDiv.innerHTML = `⚠️ 起點與終點相同，請重新選擇。`;
                        resDiv.className = "p-3 rounded-lg text-sm bg-yellow-100 text-yellow-800";
                    } else {
                        resDiv.innerHTML = `✅ 路線設定完成，請查閱轉乘系統。`;
                        resDiv.className = "p-3 rounded-lg text-sm bg-green-100 text-green-800";
                    }
                } else {
                    resDiv.innerHTML = `⚠️ 請完整選擇起點與終點站。`;
                    resDiv.className = "p-3 rounded-lg text-sm bg-red-100 text-red-800";
                }
            });

            // Tab 切換 UI
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => {
                        b.classList.remove('border-blue-600', 'text-blue-600');
                        b.classList.add('border-transparent', 'text-slate-500');
                    });
                    e.target.classList.add('border-blue-600', 'text-blue-600');
                    currentTab = e.target.id.split('-')[1];
                    renderTabContent();
                });
            });
        }

        function renderExits() {
            const container = document.getElementById('exitButtons');
            container.innerHTML = '';
            if (!currentStation?.exits) return;
            
            currentStation.exits.forEach(ex => {
                const btn = document.createElement('button');
                btn.className = "px-3 py-1 bg-white border border-slate-300 rounded shadow-sm text-sm hover:bg-blue-50";
                btn.textContent = ex.exit_name;
                btn.onclick = () => {
                    currentExit = ex;
                    renderTabContent();
                    if(ex.lat) map.setView([ex.lat, ex.lng], 16);
                };
                container.appendChild(btn);
            });
        }

        function renderTabContent() {
            const container = document.getElementById('tabContent');
            if (!currentExit) { container.innerHTML = "請先選擇車站與出口"; return; }
            
            container.innerHTML = `正在查詢 ${currentExit.exit_name} 的 ${currentTab} 資訊...`;
            markerGroup.clearLayers();
            L.marker([currentExit.lat, currentExit.lng]).addTo(markerGroup)
             .bindPopup(`${currentStation.station_name} - ${currentExit.exit_name}`).openPopup();
        }
    </script>
</body>
</html>
