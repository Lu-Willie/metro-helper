<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>捷運交通轉乘小幫手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 350px; width: 100%; border-radius: 0.5rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-10">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col">
        <header class="bg-blue-600 text-white p-4 text-center font-bold text-xl shadow-md">🚇 捷運生活圈查詢</header>

        <main class="p-4 flex-1 space-y-6">
            <section class="bg-slate-100 p-4 rounded-xl shadow-sm space-y-3">
                <h2 class="font-bold text-lg text-blue-700">🔍 捷運起訖查詢</h2>
                <select id="startStation" class="w-full p-2 border rounded-lg"></select>
                <select id="endStation" class="w-full p-2 border rounded-lg"></select>
                <button id="queryFareBtn" class="w-full bg-blue-600 text-white font-medium p-2.5 rounded-lg">查詢票價</button>
                <div id="fareResult" class="hidden p-3 rounded-lg text-sm"></div>
            </section>

            <section class="bg-slate-100 p-4 rounded-xl shadow-sm space-y-4">
                <h2 class="font-bold text-lg text-blue-700">🔍 車站周邊查詢</h2>
                <select id="queryStation" class="w-full p-2 border rounded-lg"></select>
                <div id="exitButtons" class="flex flex-wrap gap-2"></div>
                <div class="flex border-b border-slate-300">
                    <button id="tab-attraction" class="tab-btn flex-1 py-2 font-medium border-b-2 border-blue-600 text-blue-600">景點</button>
                    <button id="tab-bus" class="tab-btn flex-1 py-2 font-medium border-b-2 border-transparent text-slate-500">公車</button>
                    <button id="tab-bike" class="tab-btn flex-1 py-2 font-medium border-b-2 border-transparent text-slate-500">單車</button>
                </div>
                <div id="tabContent" class="bg-white p-3 rounded-lg border min-h-[120px] text-sm">請選擇車站</div>
                <div id="map"></div>
            </section>
        </main>
    </div>

    <script>
        let stationData = [];
        let map = null, markerGroup = null, currentStation = null, currentExit = null, currentTab = 'attraction';

        window.addEventListener('DOMContentLoaded', async () => {
            initMap();
            // 這裡請確保你有正確的 stations.json 檔案在同一目錄下
            await loadData();
            initListeners();
        });

        function initMap() {
            map = L.map('map').setView([25.0478, 121.5170], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
            markerGroup = L.layerGroup().addTo(map);
        }

        async function loadData() {
            try {
                const res = await fetch('stations.json');
                const data = await res.json();
                stationData = data;
                
                const selects = ['startStation', 'endStation', 'queryStation'];
                selects.forEach(id => {
                    const el = document.getElementById(id);
                    data.forEach(s => {
                        const opt = document.createElement('option');
                        opt.value = s.station_id;
                        opt.textContent = s.station_name;
                        el.appendChild(opt);
                    });
                });
            } catch (e) { console.error("資料載入錯誤", e); }
        }

        function initListeners() {
            document.getElementById('queryStation').addEventListener('change', (e) => {
                const id = e.target.value;
                currentStation = stationData.find(s => s.station_id === id);
                renderExits();
            });

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    currentTab = e.target.id.split('-')[1];
                    renderTabContent();
                });
            });
        }

        function renderExits() {
            const container = document.getElementById('exitButtons');
            container.innerHTML = '';
            if (!currentStation?.exits) return;
            
            currentStation.exits.forEach(ex => {
                const btn = document.createElement('button');
                btn.className = "px-3 py-1 bg-white border rounded shadow-sm text-sm";
                btn.textContent = ex.exit_name;
                btn.onclick = () => {
                    currentExit = ex;
                    renderTabContent();
                    if(ex.lat) map.setView([ex.lat, ex.lng], 16);
                };
                container.appendChild(btn);
            });
        }

        function renderTabContent() {
            const container = document.getElementById('tabContent');
            if (!currentExit) { container.innerHTML = "請選擇出口"; return; }
            
            // 此處為示意：根據 currentTab 顯示資料
            container.innerHTML = `已選擇 ${currentStation.station_name} - ${currentExit.exit_name} 的 ${currentTab} 資訊`;
            markerGroup.clearLayers();
            L.marker([currentExit.lat, currentExit.lng]).addTo(markerGroup);
        }
    </script>
</body>
</html>
